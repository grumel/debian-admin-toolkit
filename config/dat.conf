# Debian Admin Toolkit - default configuration
#
# Format: KEY=VALUE, one per line. Lines starting with '#' are comments.
# This file ships with the toolkit and holds the defaults. Do not edit it;
# override values in /etc/dat/dat.conf (system-wide) or
# ~/.config/dat/dat.conf (per user) instead.

# Minimum log level: debug | info | warn | error
DAT_LOG_LEVEL=info

# Log directory. Leave empty for the default (<install dir>/logs, with a
# fallback to ~/.local/state/dat when that is not writable).
DAT_LOG_DIR=

# UI backend: auto | whiptail | text
DAT_UI_BACKEND=auto
